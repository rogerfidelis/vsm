<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>VSM – BPMN Viewer</title>

  <!-- bpmn-js via CDN -->
  <script src="https://unpkg.com/bpmn-js@11.5.0/dist/bpmn-viewer.development.js"></script>

  <style>
    #canvas {
      width: 100%;
      height: 100vh;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<div id="canvas"></div>

<script>
  const viewer = new BpmnJS({
    container: '#canvas'
  });

  fetch('bolo.bpmn')
    .then(res => res.text())
    .then(xml => viewer.importXML(xml))
    .catch(err => console.error(err));
</script>

</body>
</html>
